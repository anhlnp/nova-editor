<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1e1e2e" rx="8"/>
  <rect x="1" y="1" width="398" height="298" fill="none" stroke="#3f3f5a" stroke-width="2" rx="7" stroke-dasharray="8 4"/>
  <!-- Mountain / image icon -->
  <g transform="translate(200,130)" opacity="0.45">
    <rect x="-44" y="-32" width="88" height="64" rx="6" fill="none" stroke="#7c7ca8" stroke-width="2.5"/>
    <!-- sun circle -->
    <circle cx="-20" cy="-12" r="9" fill="#7c7ca8"/>
    <!-- mountain -->
    <polyline points="-44,20 -14,-4 8,12 28,-8 44,20" fill="none" stroke="#7c7ca8" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <text x="200" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5f5f80" letter-spacing="1">IMAGE</text>
  <text x="200" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#3f3f5a">400 × 300</text>
</svg>
